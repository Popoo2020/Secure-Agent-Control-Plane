<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
<rect width="1200" height="420" fill="#ffffff"/>
<style>
.box{fill:#f8fafc;stroke:#111827;stroke-width:2;rx:18}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:18}
.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:18}
.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:18}
.t{font:700 26px Arial;fill:#111827}.l{font:700 18px Arial;fill:#111827}.s{font:15px Arial;fill:#374151}
.arrow{stroke:#374151;stroke-width:3;fill:none}
</style>
<text x="600" y="42" text-anchor="middle" class="t">Secure Agent Control Plane</text>
<rect x="60" y="135" width="180" height="100" class="box"/><text x="150" y="173" text-anchor="middle" class="l">User context</text><text x="150" y="200" text-anchor="middle" class="s">roles + identity</text>
<rect x="290" y="135" width="220" height="100" class="box"/><text x="400" y="173" text-anchor="middle" class="l">Tool request</text><text x="400" y="200" text-anchor="middle" class="s">action + target</text>
<rect x="560" y="135" width="230" height="100" class="box"/><text x="675" y="168" text-anchor="middle" class="l">Policy engine</text><text x="675" y="194" text-anchor="middle" class="s">role allowlist</text><text x="675" y="215" text-anchor="middle" class="s">approval gate</text>
<rect x="850" y="75" width="220" height="70" class="good"/><text x="960" y="117" text-anchor="middle" class="l">ALLOW</text>
<rect x="850" y="175" width="220" height="70" class="warn"/><text x="960" y="217" text-anchor="middle" class="l">REQUIRE APPROVAL</text>
<rect x="850" y="275" width="220" height="70" class="bad"/><text x="960" y="317" text-anchor="middle" class="l">DENY</text>
<line x1="240" y1="185" x2="290" y2="185" class="arrow"/>
<line x1="510" y1="185" x2="560" y2="185" class="arrow"/>
<line x1="790" y1="170" x2="850" y2="110" class="arrow"/>
<line x1="790" y1="185" x2="850" y2="210" class="arrow"/>
<line x1="790" y1="200" x2="850" y2="310" class="arrow"/>
</svg>
